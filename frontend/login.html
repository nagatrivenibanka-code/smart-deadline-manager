<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins';
}

/* HERO */

.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
    position:relative;
}

/* OVERLAY */

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* LOGIN BOX */

.box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

/* BUTTON */

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    opacity:0.9;
}

/* TOGGLE */

.toggleText{
    margin-top:15px;
}

.toggleText span{
    color:#667eea;
    cursor:pointer;
    font-weight:600;
}

</style>

</head>

<body>

<div class="hero">

    <div class="overlay"></div>

    <div class="box">

        <h2 id="formTitle">Login</h2>

        <input
            id="username"
            placeholder="Username"
        >

        <input
            id="password"
            type="password"
            placeholder="Password"
        >

        <button onclick="handleAuth()" id="authBtn">
            Login
        </button>

        <p class="toggleText" id="toggleText">

            New user?

            <span onclick="toggleMode()">
                Sign Up
            </span>

        </p>

    </div>

</div>

<script>

const API = "http://localhost:5000";

let isLogin = true;

/* =========================
   TOGGLE LOGIN/SIGNUP
========================= */

function toggleMode(){

    isLogin = !isLogin;

    document.getElementById("formTitle").innerText =
        isLogin ? "Login" : "Signup";

    document.getElementById("authBtn").innerText =
        isLogin ? "Login" : "Signup";

    document.getElementById("toggleText").innerHTML =

        isLogin

        ?

        `New user?

        <span onclick="toggleMode()">
            Sign Up
        </span>`

        :

        `Already have account?

        <span onclick="toggleMode()">
            Login
        </span>`;
}

/* =========================
   LOGIN / SIGNUP
========================= */

async function handleAuth(){

    const username =
        document.getElementById("username")
        .value
        .trim();

    const password =
        document.getElementById("password")
        .value
        .trim();

    if(!username || !password){

        alert("Enter all fields");

        return;
    }

    /* =========================
       SIGNUP
    ========================= */

    if(!isLogin){

        try{

            const res = await fetch(`${API}/signup`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    username,
                    password
                })

            });

            const data = await res.json();

            if(
                data.message?.toLowerCase().includes("success")
            ){

                alert("Signup Successful!");

                toggleMode();

            }else{

                alert(data.message || "Signup Failed");
            }

        }catch(err){

            console.log(err);

            alert("Backend not connected");
        }

        return;
    }

    /* =========================
       LOGIN
    ========================= */

    try{

        const res = await fetch(`${API}/login`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username,
                password
            })

        });

        const data = await res.json();

        console.log("FULL RESPONSE:", data);

        /* SUCCESS CHECK */

        if(

            data.message === "Login success"

            ||

            data.message?.toLowerCase().includes("success")

            ||

            data.success === true

        ){

            /* SAVE LOGIN */

            localStorage.setItem(
                "user",
                username
            );

            localStorage.setItem(
                "loggedIn",
                "true"
            );

            console.log(
                "LOGIN SUCCESS"
            );

            /* REDIRECT */

            window.location.href =
                "home.html";

        }

        else{

            alert("Invalid Username or Password");
        }

    }

    catch(err){

        console.log(err);

        alert("Backend not connected");
    }
}

</script>

</body>
</html>
